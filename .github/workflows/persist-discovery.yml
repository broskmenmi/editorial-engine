name: Persist editorial discovery log

on:
  push:
    branches: [main]
    paths:
      - "playlists/**/pending-discovery.md"

permissions:
  contents: write

concurrency:
  group: editorial-discovery-${{ github.ref }}
  cancel-in-progress: false

jobs:
  persist:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepend pending run records
        shell: bash
        run: |
          set -euo pipefail
          changed=false

          while IFS= read -r -d '' pending; do
            dir="$(dirname "$pending")"
            discoveries="$dir/discoveries.md"
            test -f "$discoveries"

            temp="$(mktemp)"
            head -n 31 "$discoveries" > "$temp"
            printf '\n' >> "$temp"
            cat "$pending" >> "$temp"
            printf '\n' >> "$temp"
            tail -n +32 "$discoveries" >> "$temp"
            mv "$temp" "$discoveries"
            rm "$pending"
            changed=true
          done < <(find playlists -mindepth 2 -maxdepth 2 -name pending-discovery.md -print0)

          if [ "$changed" != true ]; then
            exit 0
          fi

          git config user.name "editorial-engine[bot]"
          git config user.email "editorial-engine[bot]@users.noreply.github.com"
          git add playlists
          git commit -m "Persist editorial discovery log [skip ci]"
          git push origin HEAD:main
