name: Publish Spotify playlist

on:
  push:
    branches: [main]
    paths:
      - "playlists/**/ledger.md"
      - "apps/spotify-publisher/**"
      - ".github/workflows/publish-spotify.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: spotify-publisher-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Test publisher
        working-directory: apps/spotify-publisher
        run: npm test

      - name: Publish and verify canonical playlist
        run: node apps/spotify-publisher/src/index.js

      - name: Persist playlist identity and verified status
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- playlists/groove-over-noise/spotify.json playlists/groove-over-noise/spotify-status.json; then
            exit 0
          fi

          temp_dir="$(mktemp -d)"
          cp playlists/groove-over-noise/spotify.json "$temp_dir/spotify.json"
          cp playlists/groove-over-noise/spotify-status.json "$temp_dir/spotify-status.json"

          git config user.name "editorial-engine[bot]"
          git config user.email "editorial-engine[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4; do
            git fetch origin main

            if ! git diff --quiet "$GITHUB_SHA"..origin/main -- playlists/groove-over-noise/ledger.md; then
              echo "A newer ledger commit exists; skipping stale publication status."
              exit 0
            fi

            git reset --hard origin/main
            cp "$temp_dir/spotify.json" playlists/groove-over-noise/spotify.json
            cp "$temp_dir/spotify-status.json" playlists/groove-over-noise/spotify-status.json

            if git diff --quiet -- playlists/groove-over-noise/spotify.json playlists/groove-over-noise/spotify-status.json; then
              exit 0
            fi

            git add playlists/groove-over-noise/spotify.json playlists/groove-over-noise/spotify-status.json
            git commit -m "Update Spotify publication status [skip ci]"

            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Status push raced with another commit; retrying attempt $attempt."
            sleep $((attempt * 2))
          done

          echo "Could not persist Spotify publication status after four attempts."
          exit 1
